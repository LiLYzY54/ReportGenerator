<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>学习报告 - {{student.name}}</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
  .highlight { color: #667eea; font-weight: bold; }
  .rate { font-size: 24px; color: #0F6E56; }
</style>
</head>
<body>
  <div class="card">
    <h1>学习报告</h1>
    <p>学生姓名：<span class="highlight">{{student.name}}</span></p>
    <p>任务完成率：<span class="rate">{{summary_stats.completion_rate}}%</span></p>
    <p>AI 评语：{{ai.summary}}</p>
  </div>
</body>
</html>
